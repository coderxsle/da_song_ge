name: Build Executables

on:
  push:
    tags:
      - 'v*'  # 当推送 v* 标签时触发（如 v1.0.0）
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write  # 允许创建 release 和上传资源

jobs:
  build-windows:
    name: Build for Windows
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
        shell: bash
      
      - name: Build Windows executable
        run: python build.py
        shell: bash
      
      - name: List dist directory
        run: |
          echo "Contents of dist directory:"
          dir dist
        shell: cmd
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-executable
          path: dist/李雪松工具集.exe
          retention-days: 30

  build-macos:
    name: Build for macOS
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
      
      - name: Build macOS executable
        run: python build.py
      
      - name: List dist directory
        run: |
          echo "Contents of dist directory:"
          ls -la dist/
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-executable
          path: dist/李雪松工具集
          retention-days: 30

  create-release:
    name: Create Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-executable
          path: ./artifacts/windows
      
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-executable
          path: ./artifacts/macos
      
      - name: List artifacts
        run: |
          echo "Windows artifacts:"
          ls -la ./artifacts/windows/
          echo ""
          echo "macOS artifacts:"
          ls -la ./artifacts/macos/
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./artifacts/windows/李雪松工具集.exe
            ./artifacts/macos/李雪松工具集
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## 🎉 李雪松工具集 ${{ github.ref_name }}
            
            ### 📦 下载说明
            
            **Windows 用户：**
            - 下载 `李雪松工具集.exe`
            - 双击运行即可
            
            **macOS 用户：**
            - 下载 `李雪松工具集`
            - 添加执行权限：`chmod +x 李雪松工具集`
            - 如遇安全提示，执行：`xattr -cr 李雪松工具集`
            - 运行：`./李雪松工具集`
            
            ### ⚙️ 首次运行
            
            1. 程序会自动创建配置文件：
               - Windows: `%USERPROFILE%\.coderxslee\config.yaml`
               - macOS: `~/.coderxslee/config.yaml`
            
            2. 编辑配置文件，填入您的服务器信息
            
            3. 再次运行程序即可使用
            
            ### 💡 性能优化
            
            - 采用单文件打包，便于分发
            - 首次运行会解压到 `~/.coderxslee/._internal` (隐藏目录)
            - 后续启动速度显著提升，无需重复解压
            
            ### 📚 文档
            
            详细使用说明请查看项目 README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

