name: Build Executables

on:
  push:
    tags:
      - 'v*'  # 当推送 v* 标签时触发（如 v1.0.0）
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write  # 允许创建 release 和上传资源

jobs:
  build-windows:
    name: Build for Windows
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
        shell: bash
      
      - name: Build Windows executable
        run: python build.py
        shell: bash
      
      - name: List dist directory
        run: |
          echo "Contents of dist directory:"
          dir dist
        shell: cmd
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-executable
          path: dist/lxs.exe
          retention-days: 30

  build-macos:
    name: Build for macOS (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runs_on: macos-14
          - arch: x86_64
            runs_on: macos-13
    runs-on: ${{ matrix.runs_on }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      # 注意：macOS 上不安装 UPX，因为有已知的兼容性问题
      # PyInstaller 会自动禁用 UPX 或使用 --noupx
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
      
      - name: Build macOS executable
        run: python build.py

      - name: Rename macOS executable with architecture suffix
        run: mv dist/lxs dist/lxs-macos-${{ matrix.arch }}
      
      - name: Set executable permissions
        run: chmod +x dist/lxs-macos-${{ matrix.arch }}

      - name: Verify macOS binary architecture
        run: |
          echo "Binary architecture info:"
          file dist/lxs-macos-${{ matrix.arch }}
      
      - name: List dist directory
        run: |
          echo "Contents of dist directory:"
          ls -la dist/
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-executable-${{ matrix.arch }}
          path: dist/lxs-macos-${{ matrix.arch }}
          retention-days: 30

  create-release:
    name: Create Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-executable
          path: ./artifacts/windows
      
      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-executable-arm64
          path: ./artifacts/macos

      - name: Download macOS x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-executable-x86_64
          path: ./artifacts/macos
      
      - name: Set executable permissions for macOS binaries
        run: |
          chmod +x ./artifacts/macos/lxs-macos-arm64
          chmod +x ./artifacts/macos/lxs-macos-x86_64
      
      - name: List artifacts
        run: |
          echo "Windows artifacts:"
          ls -la ./artifacts/windows/
          echo ""
          echo "macOS artifacts:"
          ls -la ./artifacts/macos/
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./artifacts/windows/lxs.exe
            ./artifacts/macos/lxs-macos-arm64
            ./artifacts/macos/lxs-macos-x86_64
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## 🎉 李雪松工具集 ${{ github.ref_name }}
            
            ### 📦 下载说明
            
            **Windows 用户：**
            - 下载 `lxs.exe`
            - 双击运行即可
            
            **macOS 用户：**
            - Apple 芯片（M1/M2/M3）下载 `lxs-macos-arm64`
            - Intel 芯片下载 `lxs-macos-x86_64`
            - 添加执行权限：`chmod +x lxs-macos-*`
            - 如遇安全提示，执行：`xattr -cr lxs-macos-*`
            - 运行示例：`./lxs-macos-arm64`
            
            ### ⚙️ 首次运行
            
            1. 程序会自动创建配置文件：
               - Windows: `%USERPROFILE%\.coderxslee\config.yaml`
               - macOS: `~/.coderxslee/config.yaml`
            
            2. 编辑配置文件，填入您的服务器信息
            
            3. 再次运行程序即可使用
            
            ### 💡 使用说明
            
            - 单文件打包，下载即用，无需安装
            - 首次运行会自动创建配置文件
            - 配置文件位置见上方说明
            
            ### 📚 文档
            
            详细使用说明请查看项目 README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

