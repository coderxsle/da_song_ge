name: Build Executables

env:
  # 提前切换到 Node 24，避免 GitHub Actions 的 Node 20 弃用影响后续构建
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'  # 当推送 v* 标签时触发（如 v1.0.0）
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write  # 允许创建 release 和上传资源

jobs:
  build-windows:
    name: Build for Windows
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
        shell: bash
      
      - name: Build Windows executable
        # 使用统一打包脚本，确保 rich 相关数据文件会被一并带入 Windows 单文件包
        run: python build.py
        shell: bash
      
      - name: List dist directory
        run: |
          echo "Contents of dist directory:"
          dir dist
        shell: cmd
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-executable
          path: dist/lxs.exe
          retention-days: 30

  build-macos:
    name: Build for macOS (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runs_on: macos-14
          - arch: x86_64
            # Intel runner 改为当前受支持的标签，避免旧的 macos-13 配置报错
            runs_on: macos-15-intel
    runs-on: ${{ matrix.runs_on }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      # 注意：macOS 上不安装 UPX，因为有已知的兼容性问题
      # PyInstaller 会自动禁用 UPX 或使用 --noupx
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
      
      - name: Build macOS executable
        # macOS 与 Windows 共用同一份打包参数，减少平台间配置漂移
        run: python build.py

      - name: Rename macOS executable with architecture suffix
        run: mv dist/lxs dist/lxs-macos-${{ matrix.arch }}
      
      - name: Set executable permissions
        run: chmod +x dist/lxs-macos-${{ matrix.arch }}

      - name: Verify macOS binary architecture
        run: |
          echo "Binary architecture info:"
          file dist/lxs-macos-${{ matrix.arch }}
      
      - name: List dist directory
        run: |
          echo "Contents of dist directory:"
          ls -la dist/
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-executable-${{ matrix.arch }}
          path: dist/lxs-macos-${{ matrix.arch }}
          retention-days: 30

  create-release:
    name: Create Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-executable
          path: ./artifacts/windows
      
      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-executable-arm64
          path: ./artifacts/macos

      - name: Download macOS x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-executable-x86_64
          path: ./artifacts/macos
      
      - name: Set executable permissions for macOS binaries
        run: |
          chmod +x ./artifacts/macos/lxs-macos-arm64
          chmod +x ./artifacts/macos/lxs-macos-x86_64
      
      - name: List artifacts
        run: |
          echo "Windows artifacts:"
          ls -la ./artifacts/windows/
          echo ""
          echo "macOS artifacts:"
          ls -la ./artifacts/macos/
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./artifacts/windows/lxs.exe
            ./artifacts/macos/lxs-macos-arm64
            ./artifacts/macos/lxs-macos-x86_64
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## ✨ 李雪松工具集 ${{ github.ref_name }}
            
            这一版主要聚焦在 **Windows 启动稳定性** 与 **GitHub Actions 跨平台打包兼容性**。
            现在下载后即可直接使用，发布流程也对新的 runner / Node 环境做了适配。
            
            ### 🌟 本次更新
            
            - 修复 Windows 单文件版本启动时报 `rich._unicode_data.unicode17_0_0` 后闪退的问题
            - 补齐 `rich` 运行所需的隐藏导入与资源收集逻辑
            - 更新 GitHub Actions 的 Intel macOS runner 配置，解决旧标签不可用问题
            - 提前切换到 Node 24 执行 JavaScript actions，降低后续弃用风险
            
            ### 📦 下载说明
            
            **Windows 用户**
            - 下载 `lxs.exe`
            - 双击即可运行
            - 如果希望保留报错窗口，可在命令行中执行或配合 `.bat` 文件启动
            
            **macOS 用户**
            - Apple 芯片（M1 / M2 / M3 / M4）下载 `lxs-macos-arm64`
            - Intel 芯片下载 `lxs-macos-x86_64`
            - 首次运行前执行：`chmod +x lxs-macos-*`
            - 如遇系统安全提示，可执行：`xattr -cr lxs-macos-*`
            
            ### 🚀 首次使用
            
            1. 程序首次运行会自动生成配置文件
               - Windows: `%USERPROFILE%\.coderxslee\config.yaml`
               - macOS: `~/.coderxslee/config.yaml`
            2. 按需填写服务器信息与部署配置
            3. 再次启动即可开始使用
            
            ### 🧭 小提示
            
            - 本项目采用单文件打包，下载即用
            - 若 GitHub Release 中同时提供多个平台文件，请按自己的系统架构选择
            - 更详细的说明可查看仓库中的相关文档
            
            感谢使用，祝你部署顺利 ✌️
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

